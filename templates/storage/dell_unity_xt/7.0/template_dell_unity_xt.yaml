    - uuid: 59974226a3314d979b0b444681433084
      name: 'Unity: Licenses discovery'
      type: HTTP_AGENT
      key: unity.lld.licenses
      delay: 1h
      description: ''
      url: "{$UNITY.URL}/api/types/license/instances?fields=id,name,isInstalled,isValid,issued,expires,version,isPermanent"
      authtype: BASIC
      username: '{$UNITY.USER}'
      password: '{$UNITY.PASSWORD}'
      headers:
      - *id001
      - *id002
      verify_peer: 'NO'
      verify_host: 'NO'
      timeout: '{$UNITY.HTTP.TIMEOUT}'
      lifetime: 7d
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - "try{var d=JSON.parse(value);if(d&&d.entries){for(var i=0;i<d.entries.length;i++){var c=d.entries[i].content;if(c){if(c.isPermanent===undefined||c.isPermanent===null)c.isPermanent=false;}}}return JSON.stringify(d);}catch(e){return value;}"
        error_handler: DISCARD_VALUE
        error_handler_params: ''
      - type: JSONPATH
        parameters:
        - $.entries[*].content
        error_handler: DISCARD_VALUE
        error_handler_params: ''
      lld_macro_paths:
      - lld_macro: '{#LIC.ID}'
        path: $.id
      - lld_macro: '{#LIC.NAME}'
        path: $.name
      - lld_macro: '{#LIC.PERMANENT}'
        path: $.isPermanent
      item_prototypes:
      - uuid: 297cad236a674124be842354ee88b3ea
        name: 'Unity license [{#LIC.NAME}]: get'
        type: HTTP_AGENT
        key: unity.license.get[{#LIC.ID}]
