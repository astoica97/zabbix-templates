zabbix_export:
  version: '7.0'
  template_groups:
  - uuid: 45ee433c58f845ffbdb46c76858548a5
    name: Templates CSN
  templates:
  - uuid: 16b0b3ea67a542979585801d74cdae95
    vendor:
      name: ECS
      version: 7.0-1
    template: Dell EMC Unity by HTTP
    name: Dell EMC Unity by HTTP
    description: |
      Plantilla de monitorización para cabinas Dell EMC Unity (XT 380/480/680/880,
      All-Flash, Hybrid) vía Unisphere Management REST API.

      Cubre:
       - Salud del sistema y software version
       - Licencias (LLD)
       - Hardware: SP, discos, DAEs, fans, PSU, baterías, IO modules, LCC, SSC, SSD, memory (LLD)
       - Pools (LLD) con %uso, %suscripción, dedup/compresión
       - LUNs (LLD) con tamaños y %allocated
       - Filesystems (LLD) con tamaños y %uso
       - NAS Servers (LLD) con failover
       - Sesiones de replicación (LLD) con lag y estado
       - Snapshots por storage resource (LLD)
       - Alertas activas por severidad
       - Performance (CPU SP, IOPS, latencia, throughput) vía metricRealTimeQuery

      Autenticación: Basic auth + cabecera X-EMC-REST-CLIENT: true.
      Probada en Unity OE 5.x.

      Macros principales:
        {$UNITY.URL}       https://<management-ip-or-fqdn> (sin / final)
        {$UNITY.USER}      usuario read-only
        {$UNITY.PASSWORD}  contraseña (secret text)
    groups:
    - name: Templates CSN
    macros:
    - macro: '{$UNITY.URL}'
      value: https://unity-mgmt.example.com
      description: URL base de la Unisphere REST API (sin barra final).
    - macro: '{$UNITY.USER}'
      value: monitor
      description: Usuario read-only de la Unisphere REST API.
    - macro: '{$UNITY.PASSWORD}'
      value: ''
      type: SECRET_TEXT
      description: Contraseña del usuario.
    - macro: '{$UNITY.HTTP.TIMEOUT}'
      value: 30s
      description: Timeout HTTP.
    - macro: '{$UNITY.POOL.PUSED.WARN}'
      value: '90'
      description: Umbral WARN (%) de uso de pool.
    - macro: '{$UNITY.POOL.PUSED.HIGH}'
      value: '95'
      description: Umbral HIGH (%) de uso de pool.
    - macro: '{$UNITY.POOL.PUSED.CRIT}'
      value: '100'
      description: Umbral CRIT (%) de uso de pool.
    - macro: '{$UNITY.POOL.SUBSCRIBED.WARN}'
      value: '150'
      description: Umbral WARN (%) oversubscription pool.
    - macro: '{$UNITY.FS.PUSED.WARN}'
      value: '90'
      description: Umbral WARN (%) de uso de filesystem.
    - macro: '{$UNITY.FS.PUSED.HIGH}'
      value: '95'
      description: Umbral HIGH (%) de uso de filesystem.
    - macro: '{$UNITY.LUN.PUSED.WARN}'
      value: '90'
      description: Umbral WARN (%) de uso de LUN thin.
    - macro: '{$UNITY.SP.CPU.WARN}'
      value: '80'
      description: Umbral WARN (%) CPU SP.
    - macro: '{$UNITY.SP.CPU.HIGH}'
      value: '90'
      description: Umbral HIGH (%) CPU SP.
    - macro: '{$UNITY.LUN.LLD.MATCHES}'
      value: .*
      description: Regex de nombres de LUN INCLUIDOS.
    - macro: '{$UNITY.LUN.LLD.NOT_MATCHES}'
      value: CHANGE_IF_NEEDED
      description: Regex de nombres de LUN EXCLUIDOS.
    - macro: '{$UNITY.FS.LLD.MATCHES}'
      value: .*
      description: Regex de nombres de FS INCLUIDOS.
    - macro: '{$UNITY.FS.LLD.NOT_MATCHES}'
      value: CHANGE_IF_NEEDED
      description: Regex de nombres de FS EXCLUIDOS.
    - macro: '{$UNITY.POOL.LLD.MATCHES}'
      value: .*
      description: Regex de nombres de pool INCLUIDOS.
    - macro: '{$UNITY.POOL.LLD.NOT_MATCHES}'
      value: CHANGE_IF_NEEDED
      description: Regex de nombres de pool EXCLUIDOS.
    - macro: '{$UNITY.SNAP.AGE.WARN}'
      value: '604800'
      description: Edad máx (s) sin nueva snap (default 7d).
    - macro: '{$UNITY.PERF.INTERVAL}'
      value: '60'
      description: Ventana (s) del realtime metric query.
    - macro: '{$UNITY.FS.PUSED.CRIT}'
      value: '100'
      description: Filesystem used percentage threshold for DISASTER trigger.
