        description: 'Master item: returns raw JSON from Unisphere REST API.'
        url: "{$UNITY.URL}/api/instances/license/{#LIC.ID}?fields=id,name,isInstalled,isValid,issued,expires,isPermanent,version"
        authtype: BASIC
        username: '{$UNITY.USER}'
        password: '{$UNITY.PASSWORD}'
        headers:
