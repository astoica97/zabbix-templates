      - uuid: 079b09e5aecc42679845d7976a9b4a0d
        name: 'Unity license [{#LIC.NAME}]: expires (epoch)'
        type: DEPENDENT
        key: unity.license.expires[{#LIC.ID}]
        delay: '0'
        history: 7d
        trends: 365d
        value_type: UNSIGNED
        units: unixtime
        description: ''
        preprocessing:
        - type: JSONPATH
          parameters:
          - $.content.expires
          error_handler: CUSTOM_VALUE
          error_handler_params: '0'
        - type: JAVASCRIPT
          parameters:
          - if(!value||value=='null'||value=='')return 0;return Math.floor(new Date(value).getTime()/1000);
        master_item:
          key: unity.license.get[{#LIC.ID}]
        tags: []
      trigger_prototypes:
      - uuid: 546ba939908443068e518081f2b6c765
        expression: last(/Dell EMC Unity by HTTP/unity.license.valid[{#LIC.ID}])=0
        name: 'Unity license [{#LIC.NAME}]: not valid'
        priority: WARNING
        description: ''
        manual_close: 'NO'
        tags: []
      - uuid: 0b1b41a682c74d53bf22b594b55e81ec
        expression: "last(/Dell EMC Unity by HTTP/unity.license.expires[{#LIC.ID}])>0 and (last(/Dell EMC Unity by HTTP/unity.license.expires[{#LIC.ID}])-now())<2592000 and (last(/Dell EMC Unity by HTTP/unity.license.expires[{#LIC.ID}])-now())>0"
        name: 'Unity license [{#LIC.NAME}]: expires in <30 days'
        priority: WARNING
        description: ''
        manual_close: 'NO'
        tags: []
      - uuid: dd7c0c88e9824be1b1782ae6e780e320
        expression: "last(/Dell EMC Unity by HTTP/unity.license.expires[{#LIC.ID}])>0 and (last(/Dell EMC Unity by HTTP/unity.license.expires[{#LIC.ID}])-now())<0"
        name: 'Unity license [{#LIC.NAME}]: expired'
        priority: WARNING
        description: ''
        manual_close: 'NO'
        tags: []
      overrides:
      - name: 'Permanent licenses: skip expiration prototypes'
        step: '1'
        filter:
          evaltype: AND
          conditions:
          - macro: '{#LIC.PERMANENT}'
            value: ^(true|True|TRUE|1)$
            operator: MATCHES_REGEX
            formulaid: A
        operations:
        - operationobject: ITEM_PROTOTYPE
          operator: REGEXP
          value: expires
          status: DISABLED
        - operationobject: TRIGGER_PROTOTYPE
          operator: REGEXP
          value: (expires|expired)
          status: DISABLED
