    - uuid: 443cedb1c0b244528b7d493d8faae4a2
      name: 'Unity: Get realtime performance'
      type: SCRIPT
      key: unity.perf.get
      delay: 5m
      history: '0'
      trends: '0'
      value_type: TEXT
      description: "Master script item: ejecuta un metricRealTimeQuery contra la cabina y devuelve el JSON con valores agregados de CPU SP, IOPS, latencia, bandwidth y red."
      timeout: 180s
      params: |
        // Dell EMC Unity real-time performance metric query (auto-discovery + resilient).
        // Estrategia:
        //   1) Login y captura del EMC-CSRF-TOKEN.
        //   2) GET /api/types/metric/instances para construir la lista REAL de paths
        //      real-time disponibles en esta cabina/OE. Filtramos por sufijos que nos
        //      interesan (CPU, LUN IOPS/BW/latency, red, FE FC/iSCSI).
        //   3) Si el catálogo no devuelve isRealtimeAvailable o sale vacío, caemos a
        //      una wishlist canónica con wildcards.
        //   4) POST /api/types/metricRealTimeQuery/instances con esos paths. Si la
        //      cabina rechaza alguno con "Invalid stat path", lo retiramos y
        //      reintentamos hasta 10 veces.
        //   5) Sleep + GET del resultado, DELETE del query.
        try {
            var url      = '{$UNITY.URL}';
            var user     = '{$UNITY.USER}';
            var pass     = '{$UNITY.PASSWORD}';
            var interval = parseInt('{$UNITY.PERF.INTERVAL}') || 60;

            // Sufijos canónicos que nos interesan (independientes de cómo represente
            // el array los wildcards: 'sp.*.cpu...' o 'sp.spa.cpu...').
            var WANT = [
                'cpu.summary.utilization',
                'cpu.summary.busyTicks',
                'cpu.summary.idleTicks',
                'storage.lun.*.totalIoRate',
                'storage.lun.*.readIoRate',
                'storage.lun.*.writeIoRate',
                'storage.lun.*.totalBandwidth',
                'storage.lun.*.readBandwidth',
                'storage.lun.*.writeBandwidth',
                'storage.lun.*.responseTime',
                'storage.lun.*.queueLength',
                'net.basic.inBytesRate',
                'net.basic.outBytesRate',
                'fibreChannel.fePort.*.totalBandwidth',
                'iscsi.fePort.*.totalBandwidth'
            ];

            // Wishlist por defecto (si no podemos descubrir el catálogo).
            var FALLBACK_PATHS = [
                'sp.*.cpu.summary.utilization',
                'sp.*.cpu.summary.busyTicks',
                'sp.*.cpu.summary.idleTicks',
                'sp.*.storage.lun.*.totalIoRate',
                'sp.*.storage.lun.*.readIoRate',
                'sp.*.storage.lun.*.writeIoRate',
                'sp.*.storage.lun.*.totalBandwidth',
                'sp.*.storage.lun.*.readBandwidth',
                'sp.*.storage.lun.*.writeBandwidth',
                'sp.*.storage.lun.*.responseTime',
                'sp.*.storage.lun.*.queueLength',
                'sp.*.net.basic.inBytesRate',
                'sp.*.net.basic.outBytesRate',
                'sp.*.fibreChannel.fePort.*.totalBandwidth',
                'sp.*.iscsi.fePort.*.totalBandwidth'
            ];

            var req = new HttpRequest();
            req.addHeader('X-EMC-REST-CLIENT: true');
            req.addHeader('Accept: application/json');
            req.addHeader('Content-Type: application/json');
            req.setHttpAuth(HTTPAUTH_BASIC, user, pass);

            // 1) Login + CSRF
            req.get(url + '/api/types/loginSessionInfo/instances');
            var headers = req.getHeaders();
            var csrf = null;
            for (var k in headers) {
                if (k.toLowerCase() === 'emc-csrf-token') { csrf = headers[k]; break; }
            }
            if (!csrf) throw 'No EMC-CSRF-TOKEN returned by login';
            req.addHeader('EMC-CSRF-TOKEN: ' + csrf);

            // 2) Descubrir catálogo de métricas
            var paths = [];
            try {
                var catResp = req.get(url + '/api/types/metric/instances?fields=path,isRealtimeAvailable&compact=true&per_page=10000');
                var cat = JSON.parse(catResp);
                var entries = (cat && cat.entries) || [];
                for (var i = 0; i < entries.length; i++) {
                    var c = entries[i].content;
                    if (!c || !c.path) continue;
                    // Si el catalog reporta isRealtimeAvailable=false, saltar
                    if (c.isRealtimeAvailable === false) continue;
                    for (var j = 0; j < WANT.length; j++) {
                        var w = WANT[j];
                        // Match por sufijo: comparamos parte final del path
                        if (c.path.length >= w.length &&
                            c.path.substr(c.path.length - w.length) === w) {
                            paths.push(c.path);
                            break;
                        }
                    }
                }
                Zabbix.log(4, 'unity perf: catalog gave ' + paths.length + ' real-time paths');
            } catch (e) {
                Zabbix.log(3, 'unity perf: catalog discovery failed: ' + e + ' -> using fallback');
            }

            if (paths.length === 0) {
                Zabbix.log(4, 'unity perf: empty discovery -> using FALLBACK_PATHS');
                paths = FALLBACK_PATHS.slice();
            }

            // 3) POST con retries
            var qid = null;
            var maxAttempts = 10;
            for (var attempt = 0; attempt < maxAttempts && paths.length > 0; attempt++) {
                var qresp;
                try {
                    qresp = req.post(url + '/api/types/metricRealTimeQuery/instances',
                                     JSON.stringify({paths: paths, interval: interval}));
                } catch (e) {
                    throw 'POST failed: ' + e;
                }
                var status = 0;
                try { status = req.getStatus(); } catch (e) {}

                if (status >= 200 && status < 300) {
                    try {
                        var q = JSON.parse(qresp);
                        qid = q && q.content && q.content.id;
                    } catch (e) {}
                    if (qid) break;
                }

                // Extraer "Invalid stat path specified: <path>"
                var bad = null;
                try {
                    var errJson = JSON.parse(qresp);
                    var msgs = (errJson && errJson.error && errJson.error.messages) || [];
                    for (var j = 0; j < msgs.length; j++) {
                        var m = msgs[j];
                        var text = '';
                        for (var lang in m) { text += ' ' + m[lang]; }
                        var rx = /Invalid stat path[^:]*:\s*([^\s.,]+(?:\.[^\s.,]+)*)/;
                        var match = text.match(rx);
                        if (match && match[1]) { bad = match[1].replace(/[.,]+$/, ''); break; }
                    }
                } catch (e) {}

                if (bad) {
                    Zabbix.log(4, 'unity perf: removing invalid path ' + bad);
                    var newPaths = [];
                    for (var n = 0; n < paths.length; n++) {
                        if (paths[n] !== bad) newPaths.push(paths[n]);
                    }
                    if (newPaths.length === paths.length) {
                        throw 'Could not remove path ' + bad + ' from list';
                    }
                    paths = newPaths;
                    continue;
                }

                throw 'metricRealTimeQuery rejected and no parseable invalid path: status ' + status + ' body ' + qresp;
            }

            if (!qid) throw 'No valid paths accepted after ' + maxAttempts + ' attempts';

            Zabbix.sleep((interval + 5) * 1000);

            var rresp = req.get(url + '/api/types/metricQueryResult/instances?filter=queryId%20EQ%20' + qid +
                                '&fields=path,values,timestamp,interval,queryId&per_page=5000');

            try { req.customRequest('DELETE', url + '/api/instances/metricRealTimeQuery/' + qid, ''); } catch (e) {}

            return rresp;
        } catch (err) {
            Zabbix.log(3, 'unity perf script error: ' + err);
            throw err;
        }
      tags:
      - tag: component
        value: performance
